<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Sentinel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; }
    h1 { text-align: center; padding: 2rem 0 1rem; font-size: 1.8rem; color: #fff; }
    .tabs { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .tab { padding: 0.6rem 1.4rem; border: 1px solid #333; background: #1a1a1a; color: #aaa; border-radius: 8px; cursor: pointer; font-size: 0.95rem; transition: all 0.2s; }
    .tab:hover { border-color: #555; color: #fff; }
    .tab.active { background: #e12a5c; border-color: #e12a5c; color: #fff; }
    .panels { max-width: 500px; margin: 0 auto; padding: 0 1rem 3rem; }
    .panel { display: none; }
    .panel.active { display: block; }
    .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 1.5rem; }
    .card h2 { font-size: 1.2rem; margin-bottom: 1rem; color: #fff; }
    label { display: block; font-size: 0.85rem; color: #999; margin-bottom: 0.3rem; margin-top: 1rem; }
    label:first-of-type { margin-top: 0; }
    input, textarea, select { width: 100%; padding: 0.6rem 0.8rem; background: #111; border: 1px solid #333; border-radius: 6px; color: #e0e0e0; font-size: 0.95rem; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #e12a5c; }
    textarea { resize: vertical; min-height: 80px; }
    button.send { display: block; width: 100%; margin-top: 1.5rem; padding: 0.75rem; background: #e12a5c; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    button.send:hover { background: #c9224f; }
    button.send:disabled { opacity: 0.5; cursor: not-allowed; }
    .result { margin-top: 1rem; padding: 0.8rem; border-radius: 6px; font-size: 0.85rem; font-family: monospace; word-break: break-all; }
    .result.ok { background: #0a2a1a; border: 1px solid #1a5a3a; color: #4ade80; }
    .result.err { background: #2a0a0a; border: 1px solid #5a1a1a; color: #f87171; }
  </style>
</head>
<body>
  <h1>Project Sentinel</h1>
  <div class="tabs">
    <div class="tab active" data-panel="sms">SMS</div>
    <div class="tab" data-panel="call">Call</div>
    <div class="tab" data-panel="voice">Voice Message</div>
    <div class="tab" data-panel="whatsapp">WhatsApp</div>
  </div>
  <div class="panels">
    <!-- SMS -->
    <div class="panel active" id="sms">
      <div class="card">
        <h2>Send SMS</h2>
        <label for="sms-to">To (e.g. +48123456789)</label>
        <input id="sms-to" type="tel" placeholder="+48...">
        <label for="sms-body">Message</label>
        <textarea id="sms-body" placeholder="Hello from Twilio!"></textarea>
        <button class="send" onclick="sendSms()">Send SMS</button>
        <div id="sms-result"></div>
      </div>
    </div>
    <!-- Call -->
    <div class="panel" id="call">
      <div class="card">
        <h2>Make a Call</h2>
        <label for="call-to">To</label>
        <input id="call-to" type="tel" placeholder="+48...">
        <label for="call-msg">What to say</label>
        <textarea id="call-msg" placeholder="Hello, this is a test call."></textarea>
        <label for="call-lang">Language</label>
        <select id="call-lang">
          <option value="en-US">English (US)</option>
          <option value="en-GB">English (UK)</option>
          <option value="pl-PL">Polish</option>
          <option value="de-DE">German</option>
          <option value="fr-FR">French</option>
          <option value="es-ES">Spanish</option>
        </select>
        <button class="send" onclick="makeCall()">Call</button>
        <div id="call-result"></div>
      </div>
    </div>
    <!-- Voice Message -->
    <div class="panel" id="voice">
      <div class="card">
        <h2>Send Voice Message</h2>
        <p style="color:#888;font-size:0.85rem;margin-bottom:1rem;">Calls the number and reads your message aloud via TTS, then hangs up.</p>
        <label for="voice-to">To</label>
        <input id="voice-to" type="tel" placeholder="+48...">
        <label for="voice-msg">Message</label>
        <textarea id="voice-msg" placeholder="This is an important voice message..."></textarea>
        <label for="voice-lang">Language</label>
        <select id="voice-lang">
          <option value="en-US">English (US)</option>
          <option value="en-GB">English (UK)</option>
          <option value="pl-PL">Polish</option>
          <option value="de-DE">German</option>
          <option value="fr-FR">French</option>
          <option value="es-ES">Spanish</option>
        </select>
        <button class="send" onclick="sendVoice()">Send Voice Message</button>
        <div id="voice-result"></div>
      </div>
    </div>
    <!-- WhatsApp -->
    <div class="panel" id="whatsapp">
      <div class="card">
        <h2>Send WhatsApp Message</h2>
        <p style="color:#888;font-size:0.85rem;margin-bottom:1rem;">Uses the Twilio Sandbox by default. Make sure you've joined it first.</p>
        <label for="wa-to">To (without whatsapp: prefix)</label>
        <input id="wa-to" type="tel" placeholder="+48...">
        <label for="wa-body">Message</label>
        <textarea id="wa-body" placeholder="Hello from WhatsApp!"></textarea>
        <button class="send" onclick="sendWhatsapp()">Send WhatsApp</button>
        <div id="wa-result"></div>
      </div>
    </div>
  </div>

  <script>
    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.panel).classList.add('active');
      });
    });

    async function api(url, body, resultId) {
      const el = document.getElementById(resultId);
      el.textContent = 'Sending...';
      el.className = 'result';
      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (res.ok) {
          el.textContent = `OK — SID: ${data.sid}, Status: ${data.status}`;
          el.className = 'result ok';
        } else {
          el.textContent = `Error: ${data.error || JSON.stringify(data)}`;
          el.className = 'result err';
        }
      } catch (e) {
        el.textContent = `Network error: ${e.message}`;
        el.className = 'result err';
      }
    }

    function sendSms() {
      api('/api/sms', {
        to: document.getElementById('sms-to').value,
        body: document.getElementById('sms-body').value,
      }, 'sms-result');
    }

    function makeCall() {
      api('/api/call', {
        to: document.getElementById('call-to').value,
        message: document.getElementById('call-msg').value,
        language: document.getElementById('call-lang').value,
      }, 'call-result');
    }

    function sendVoice() {
      api('/api/voice-message', {
        to: document.getElementById('voice-to').value,
        message: document.getElementById('voice-msg').value,
        language: document.getElementById('voice-lang').value,
      }, 'voice-result');
    }

    function sendWhatsapp() {
      api('/api/whatsapp', {
        to: document.getElementById('wa-to').value,
        body: document.getElementById('wa-body').value,
      }, 'wa-result');
    }
  </script>
</body>
</html>
