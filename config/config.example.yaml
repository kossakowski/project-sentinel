# -----------------------------------------------------------------------------
# SOURCES -- Where we scan
# -----------------------------------------------------------------------------
sources:
  # --- RSS Feeds ---
  rss:
    # Polish media
    - name: PAP
      url: https://www.pap.pl/rss.xml
      language: pl
      enabled: false  # Blocked by Incapsula WAF since ~2026. Use site:pap.pl Google News query instead.
      priority: 1

    - name: TVN24
      url: https://tvn24.pl/najnowsze.xml
      language: pl
      enabled: true
      priority: 1

    - name: RMF24
      url: https://www.rmf24.pl/feed
      language: pl
      enabled: true
      priority: 1

    - name: Polsat News
      url: https://www.polsatnews.pl/rss/wszystkie.xml
      language: pl
      enabled: true
      priority: 2

    - name: Defence24
      url: https://defence24.pl/_rss
      language: pl
      enabled: true
      priority: 1

    - name: Rzeczpospolita
      url: https://www.rp.pl/rss_main
      language: pl
      enabled: true
      priority: 2

    - name: Gazeta Wyborcza
      url: https://rss.gazeta.pl/pub/rss/najnowsze_wyborcza.xml
      language: pl
      enabled: true
      priority: 2

    # Baltic media (English)
    - name: ERR Estonia
      url: https://news.err.ee/rss
      language: en
      enabled: true
      priority: 2

    - name: LRT Lithuania
      url: https://www.lrt.lt/en/news-in-english?rss
      language: en
      enabled: true
      priority: 2

    - name: LSM Latvia
      url: https://eng.lsm.lv/rss/
      language: en
      enabled: true
      priority: 2

    # International media
    - name: BBC World
      url: https://feeds.bbci.co.uk/news/world/rss.xml
      language: en
      enabled: true
      priority: 3

    - name: Al Jazeera
      url: https://www.aljazeera.com/xml/rss/all.xml
      language: en
      enabled: true
      priority: 3

    - name: Defence24 EN
      url: https://defence24.com/_rss
      language: en
      enabled: true
      priority: 2

    # Russian media (for counter-indicator monitoring)
    - name: TASS
      url: https://tass.com/rss/v2.xml
      language: en
      enabled: true
      priority: 3

    # Ukrainian media (Ukrainian language -- publishes before EN edition)
    - name: Ukrainska Pravda UA
      url: https://www.pravda.com.ua/rss/view_news/
      language: uk
      enabled: true
      priority: 1

    # Polish portals
    - name: Onet Wiadomości
      url: https://wiadomosci.onet.pl/.feed
      language: pl
      enabled: true
      priority: 2

    # Ukrainian wire service (English)
    - name: Interfax-Ukraine EN
      url: https://en.interfax.com.ua/news/last.rss
      language: en
      enabled: true
      priority: 2

  # --- GDELT ---
  gdelt:
    enabled: true
    update_interval_minutes: 15
    themes:
      - ARMEDCONFLICT
      - WB_2462_POLITICAL_VIOLENCE_AND_WAR
      - CRISISLEX_C03_WELLBEING_HEALTH
      - TAX_FNCACT_MILITARY
    cameo_codes:
      - "18"
      - "19"
      - "190"
      - "191"
      - "192"
      - "193"
      - "194"
      - "195"
      - "20"
    goldstein_threshold: -7.0

  # --- Google News ---
  google_news:
    enabled: true
    queries:
      - query: "military attack Poland"
        language: en
      - query: "invasion Baltic states"
        language: en
      - query: "Russia attack NATO"
        language: en
      - query: "atak wojskowy Polska"
        language: pl
      - query: "inwazja Polska"
        language: pl
      - query: "Rosja atak"
        language: pl
      - query: "військовий напад Польща"
        language: uk
      - query: "NATO Article 5"
        language: en
      - query: "drone incursion Poland"
        language: en
      - query: "airspace violation Poland"
        language: en
      - query: "scrambled jets Poland"
        language: en
      - query: "rosyjskie drony Polska"
        language: pl
      - query: "naruszenie przestrzeni powietrznej"
        language: pl
      - query: "zamknięcie lotniska Polska"
        language: pl
      - query: "дрони Польща"
        language: uk
      # PAP workaround: pap.pl is behind Incapsula WAF blocking all non-browser
      # requests. Route PAP content through Google News site: operator.
      - query: "site:pap.pl"
        language: pl

  # --- Telegram ---
  telegram:
    enabled: true
    channels:
      - name: Ukrainian Air Force
        channel_id: "@kpszsu"
        language: uk
        priority: 1
      - name: General Staff of Ukraine
        channel_id: "@GeneralStaffZSU"
        language: uk
        priority: 1
      - name: DeepState UA
        channel_id: "@DeepStateUA"
        language: uk
        priority: 2
      - name: NEXTA Live
        channel_id: "@nexta_live"
        language: ru
        priority: 1
    api_id: "${TELEGRAM_API_ID}"
    api_hash: "${TELEGRAM_API_HASH}"
    session_name: sentinel_session

# -----------------------------------------------------------------------------
# PROCESSING -- Deduplication settings
# -----------------------------------------------------------------------------
processing:
  dedup:
    same_source_title_threshold: 85
    cross_source_title_threshold: 95
    lookback_minutes: 60

# -----------------------------------------------------------------------------
# CLASSIFICATION -- LLM settings
# -----------------------------------------------------------------------------
classification:
  model: claude-haiku-4-5-20251001
  max_tokens: 512
  temperature: 0.0
  corroboration_required: 2
  corroboration_window_minutes: 60

# -----------------------------------------------------------------------------
# ALERTS -- Notification settings
# -----------------------------------------------------------------------------
alerts:
  phone_number: "${ALERT_PHONE_NUMBER}"
  language: pl

  urgency_levels:
    critical:
      min_score: 9
      action: phone_call
      corroboration_required: 2
      retry_attempts: 3
      retry_interval_minutes: 5
      fallback: sms
    high:
      min_score: 7
      action: sms
      corroboration_required: 1
    medium:
      min_score: 5
      action: whatsapp
      corroboration_required: 1
    low:
      min_score: 1
      action: log_only

  templates:
    call: "{event_type_pl} wykryte. {summary_pl}. Źródła potwierdzające: {source_count}. Pilność: {urgency_score} na 10."
    sms: "\U0001f6a8 PROJECT SENTINEL: {event_type_pl}\nPilność: {urgency_score}/10\nKraje: {affected_countries_str}\nAgresor: {aggressor}\n\n{summary_pl}\n\nŹródła ({source_count}):\n{sources_list}\n\nWykryto: {first_seen_at_local}"
    sms_update: "\u2139\ufe0f PROJECT SENTINEL UPDATE: {event_type_pl}\nNowe informacje ({new_source_name}):\n{summary_pl}\n\nŁącznie źródeł: {source_count}\nPilność: {urgency_score}/10"

  acknowledgment:
    call_duration_threshold_seconds: 15
    max_call_retries: 5
    retry_interval_minutes: 5
    cooldown_hours: 6

# -----------------------------------------------------------------------------
# SCHEDULER
# -----------------------------------------------------------------------------
scheduler:
  # Fast lane: Telegram + priority-1 RSS + Google News
  fast_interval_minutes: 3
  # Slow lane: all sources (GDELT, lower-priority RSS, etc.)
  interval_minutes: 15
  jitter_seconds: 30

# -----------------------------------------------------------------------------
# DATABASE
# -----------------------------------------------------------------------------
database:
  path: data/sentinel.db
  article_retention_days: 30
  event_retention_days: 90

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
logging:
  level: INFO
  file: logs/sentinel.log
  max_size_mb: 50
  backup_count: 5

# -----------------------------------------------------------------------------
# TESTING
# -----------------------------------------------------------------------------
testing:
  dry_run: false
  test_mode: false
  test_headlines_file: tests/fixtures/test_headlines.yaml
