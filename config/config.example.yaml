# =============================================================================
# Project Sentinel Configuration
# =============================================================================
# Copy this file to config/config.yaml and adjust values.
# Secrets (API keys, phone numbers) are referenced via ${ENV_VAR} and loaded
# from .env -- never put secrets directly in this file.
# =============================================================================

# -----------------------------------------------------------------------------
# MONITORING -- What we're watching for
# -----------------------------------------------------------------------------
monitoring:
  # Countries we're monitoring for attacks ON
  target_countries:
    - code: PL
      name: Poland
      name_native: Polska
    - code: LT
      name: Lithuania
      name_native: Litwa
    - code: LV
      name: Latvia
      name_native: Łotwa
    - code: EE
      name: Estonia
      name_native: Estonia

  # Potential aggressors
  aggressor_countries:
    - code: RU
      name: Russia
      name_native: Rosja
    - code: BY
      name: Belarus
      name_native: Białoruś

  # Keywords by language -- CRITICAL triggers phone call, HIGH triggers SMS
  keywords:
