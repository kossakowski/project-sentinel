        - "invasion"
        - "troops crossed border"
        - "missile strike"
        - "aerial bombardment"
        - "declaration of war"
        - "Article 5"
        - "armed attack"
        - "act of war"
        - "offensive operation"
        - "ground invasion"
        - "amphibious assault"
        - "nuclear strike"
        - "carpet bombing"
        - "total war"
        - "war declared"
      high:
        - "military buildup"
        - "troops massing"
        - "airspace violation"
        - "shots fired"
        - "border incident"
        - "mobilization"
        - "military escalation"
        - "no-fly zone violated"
        - "naval confrontation"
        - "cyberattack on infrastructure"
        - "martial law declared"
        - "reservists called up"
        - "border closed"
        - "drone incursion"
        - "artillery fire"
        - "troop deployment"
        - "military convoy"
        - "Shahed"
        - "Geran"
        - "Gerbera"
        - "Iskander"
        - "Kinzhal"
        - "Kalibr"
        - "drone crash"
        - "drone crashed"
        - "drone strike"
        - "UAV"
        - "scramble"
        - "scrambled"
        - "scrambles"
        - "sabotage"
        - "GPS jamming"
        - "cyberattack"
