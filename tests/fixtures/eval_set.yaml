# Sentinel Classification Eval Set
# Extracted from 8 daily audit reports: 2026-03-24 through 2026-05-01
# Each entry represents a documented classification example (wrong or notably correct)
# from the manual audit record. Use for regression testing of the Haiku classifier.
#
# Schema fields:
#   haiku_output: what the classifier actually produced (null = not reported in audit)
#   expected:     what the audit determined was correct
#   failure_mode: dominant failure pattern
#
# Failure mode vocabulary:
#   google_news_query_bias        - classifier inferred country from query string, not article
#   ukraine_as_monitored          - Ukrainian territory/event misclassified as PL/LT/LV/EE
#   romania_spillover             - non-monitored country (RO/FI) misidentified as monitored
#   headline_literal_no_qualifiers - qualifier words (propaganda/threatens/prepares) ignored
#   cyber_severity_inflation      - vulnerability disclosure or stats rated as active incident
#   attribution_uncertain_high_urgency - high urgency despite unknown aggressor/low confidence
#   propaganda_treated_as_attack  - information operation classified as kinetic event
#   false_negative_filtered_out   - missed by keyword filter (included where summary is quoted)
#   correct_classification        - explicitly praised in audit as correct
#   other                         - does not fit above categories

---

